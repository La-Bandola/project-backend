# =============================================================================
# ⚠️  ARCHIVO DEPRECADO — No usar este docker-compose directamente.
#
# Este archivo solo levanta el backend + base de datos de forma aislada.
# Para desarrollo normal del proyecto, usa el docker-compose.yml de la raíz:
#
#   cd ..         (sube a la carpeta Parcheck/)
#   docker-compose up --build
#
# Este archivo puede ser útil únicamente si necesitas correr el backend
# sin el frontend (por ejemplo, para ejecutar pruebas de API).
# =============================================================================


  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data: