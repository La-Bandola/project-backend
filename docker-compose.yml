services:
  db:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:danfo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:danfo_pass}
      POSTGRES_DB: ${POSTGRES_DB:parcheck}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-danfo_user} -d ${POSTGRES_DB:-parcheck} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local